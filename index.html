adding:12px;border-radius:18px;border:1px dashed var(--line);background:#fff9f2;color:var(--muted);min-height:54px;line-height:1.6}.side-title{margin:0 0 8px;font-size:20px}.life-box{background:#fff;border:1px solid var(--line2);border-radius:20px;padding:14px;margin-bottom:12px;text-align:center}.life-label{font-weight:900;color:#7b5f4c;margin-bottom:8px}.lives{font-size:34px;letter-spacing:5px;min-height:48px}.collection{display:grid;gap:10px}.item-slot{display:flex;align-items:center;gap:10px;padding:10px;border-radius:18px;background:#fff;border:1px solid var(--line2)}.item-icon{width:42px;height:42px;display:grid;place-items:center;border-radius:16px;background:#fff9f2;border:1px solid var(--line);font-size:23px;filter:grayscale(1);opacity:.45}.item-slot.got .item-icon{filter:none;opacity:1;background:var(--pink-soft);border-color:#efc5d1}.item-name{font-weight:900}.small{color:var(--muted);font-size:13px;line-height:1.65}.reset{width:100%;margin-top:10px;border:2px dashed var(--line);background:#fff;color:#7b5f4c}.center-screen{text-align:center;padding:30px 12px}.big{font-size:82px}.reveal{display:inline-grid;place-items:center;width:76px;height:76px;border-radius:22px;background:#fff9df;border:2px solid #f5dfa0;font-size:40px;font-weight:900;margin:8px 0}.code-input{width:210px;max-width:100%;border:2px solid var(--line);border-radius:16px;padding:12px;font-size:25px;text-align:center;letter-spacing:12px;font-weight:900;background:#fff}.error{color:#b84b60;font-weight:900;min-height:25px;margin-top:8px}.celebrate{font-size:23px;line-height:2;margin:16px 0}

.debug-fab{position:fixed;right:14px;bottom:14px;z-index:50;width:48px;height:48px;border-radius:50%;border:2px solid var(--line);background:#fff;box-shadow:var(--shadow);font-size:22px;cursor:pointer}.debug-modal{position:fixed;inset:0;z-index:60;background:rgba(59,48,40,.35);display:none;place-items:center;padding:16px}.debug-modal.open{display:grid}.debug-panel{width:min(520px,100%);max-height:90vh;overflow:auto;background:var(--paper);border:2px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px}.debug-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.debug-grid button{border:2px solid var(--line);background:#fff;border-radius:16px;padding:11px;font-weight:900;cursor:pointer}.debug-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}.debug-code{font-size:28px;font-weight:900;letter-spacing:8px;text-align:center;background:#fff9df;border:2px solid #f5dfa0;border-radius:16px;padding:10px;margin:10px 0}.debug-close{width:100%;margin-top:12px;border:2px dashed var(--line);background:#fff;border-radius:999px;padding:11px;font-weight:900;cursor:pointer}

<body>
<header><div class="title"><h1>数列クエスト</h1></div><p>4つの部屋を順番に攻略して、宝箱の暗証番号を集めよう！</p></header>
<main><section class="card"><div class="content"><div class="topbar"><span class="badge" id="locationBadge">🏰 エントランス</span><button class="back" id="lobbyBtn" style="display:none" onclick="renderLobby()">← エントランスへ</button></div><div class="progress-wrap"><div class="progress-label"><span>クエスト進行度</span><span id="progressText">0 / 4 部屋</span></div><div class="progress"><div class="progress-bar" id="progressBar"></div></div><div class="quest-inventory" id="questInventory" aria-label="獲得アイテム一覧"></div></div><div id="screen"></div></div></section></main><script>
const roomInfo=[
{name:"等差数列",icon:"🌸",color:"door1"},{name:"等比数列",icon:"💎",color:"door2"},{name:"シグマ",icon:"📜",color:"door3"},{name:"階差数列",icon:"🧭",color:"door4"}
];
let completed=[false,false,false,false];
const code=Array.from({length:4},()=>Math.floor(Math.random()*10)).join("");
let mode="lobby";
const screen=document.getElementById("screen"),progressBar=document.getElementById("progressBar"),progressText=document.getElementById("progressText"),questInventory=document.getElementById("questInventory"),locationBadge=document.getElementById("locationBadge"),lobbyBtn=document.getElementById("lobbyBtn");
function shuffle(arr){const c=[...arr];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function randomInt(n){return Math.floor(Math.random()*n)}
function typeset(){if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise().catch(()=>{})}}
function geometricLatex(value){
  let t=String(value).trim();
  if(!/[a-zA-Z^・]/.test(t)&&!/^\([^)]*\/[^)]*\)/.test(t))return t;
  t=t.replace(/^an=/,'a_n=');
  t=t.replace(/・/g,'\\cdot ');
  t=t.replace(/\(([-+]?\d+)\/(\d+)\)/g,'\\left(\\frac{$1}{$2}\\right)');
  t=t.replace(/\(([-+]?\d+)\)\^\(n-1\)/g,'\\left($1\\right)^{n-1}');
  t=t.replace(/([A-Za-z0-9_]+)\^\(n-1\)/g,'$1^{n-1}');
  t=t.replace(/\(([-+]?\d+)\)\^n/g,'\\left($1\\right)^n');
  t=t.replace(/([A-Za-z0-9_]+)\^([A-Za-z0-9+-]+)/g,'$1^{$2}');
  return `\\(${t}\\)`;
}
function geometricFeedback(text){
  return String(text).replace(/an=([^。！]+)/g,(m,f)=>geometricLatex('an='+f));
}
function globalItemData(){return [
  {name:"等差",items:arithmeticItems.map(x=>[x.item,x.name]),got:completed[0]?4:(roomState&&roomState.type==="arithmetic"?roomState.gotItems.filter(Boolean).length:0)},
  {name:"等比",items:geometricItems.slice(0,4),got:completed[1]?4:(roomState&&roomState.type==="geometric"?roomState.gotItems.filter(Boolean).length:0)},
  {name:"シグマ",items:sigmaItems,got:completed[2]?3:(sigmaState?sigmaState.gotItems.filter(Boolean).length:0)},
  {name:"階差",items:differenceItems,got:completed[3]?3:(differenceState?differenceState.gotItems.filter(Boolean).length:0)}
]}
function renderGlobalItems(){
  if(!questInventory)return;
  questInventory.innerHTML=globalItemData().map(group=>`<div class="quest-item-group"><div class="quest-item-group-title">${group.name} ${group.got}/${group.items.length}</div><div class="quest-item-row">${group.items.map((it,i)=>`<span class="quest-token ${i<group.got?"got":""}" title="${it[1]}">${it[0]}</span>`).join("")}</div></div>`).join("");
}
function updateHeader(){const count=completed.filter(Boolean).length;const totalGot=globalItemData().reduce((sum,g)=>sum+g.got,0);progressText.textContent=`${count} / 4 部屋　アイテム ${totalGot} / 14`;progressBar.style.width=`${totalGot/14*100}%`;renderGlobalItems();lobbyBtn.style.display=mode==="lobby"?"none":"inline-block";locationBadge.textContent=mode==="arithmetic"?"🌸 等差数列の部屋":mode==="geometric"?"💎 等比数列の部屋":mode==="sigma"?"📜 シグマの部屋":mode==="difference"?"🧭 階差数列の部屋":mode==="treasure"?"🎁 宝箱":"🏰 エントランス"}
function renderLobby(){mode="lobby";updateHeader();const count=completed.filter(Boolean).length;const doors=roomInfo.map((r,i)=>{const unlocked=i===0||completed[i-1]||completed[i];const state=completed[i]?"クリア済み":unlocked?"OPEN":"LOCK";const note=completed[i]?"開くと暗証番号を確認できます":unlocked?"クリックして入る":"前の部屋をクリアしよう";return `<div class="door-wrap"><button class="door ${r.color} ${unlocked?"":"locked"} ${completed[i]?"completed":""}" ${unlocked?`onclick="enterRoom(${i})"`:"disabled"}><span class="door-icon">${completed[i]?"✨":unlocked?r.icon:"🔒"}</span><span class="door-state">${state}</span></button><div class="door-name">${r.name}</div><div class="door-note">${note}</div></div>`}).join("");screen.innerHTML=`<div class="intro"><h2>4つの扉を攻略しよう！</h2><p>部屋をクリアすると暗証番号を1桁獲得できます。<br>番号を忘れたら、クリア済みの扉をもう一度開こう。</p></div><div class="doors">${doors}</div><div class="treasure-zone"><div class="chest ${count===4?"ready":""}">${count===4?"🧰":"🔒"}</div><h3>${count===4?"4つの番号がそろった！":"宝箱はまだ開かない…"}</h3><div class="code-digits">${[0,1,2,3].map(()=>'<div class="code-digit">?</div>').join("")}</div>${count===4?'<button class="action" onclick="openTreasure()">宝箱に挑戦する</button>':""}</div>`}
function enterRoom(i){if(i===0){completed[0]?renderRoomCleared(0):startArithmetic()}else if(i===1){completed[1]?renderRoomCleared(1):startGeometric()}else if(i===2){completed[2]?renderSigmaCleared():startSigma()}else if(i===3){completed[3]?renderDifferenceCleared():startDifference()}}
function renderPlaceholder(i){mode="placeholder";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">${roomInfo[i].icon}</div><h2>${roomInfo[i].name}の部屋</h2><p>この部屋はこれから作っていきます🐰</p><button class="action" onclick="renderLobby()">エントランスへ戻る</button></div>`}

const arithmeticItems=[{item:"🔍",name:"法則のルーペ"},{item:"📜",name:"一般項の巻物"},{item:"🧺",name:"和のバスケット"},{item:"🗝️",name:"公差のカギ"}];
const arithmeticSets=[
[
{title:"等差数列の森",sequence:[3,7,11,15],general:"aₙ=4n-1",sumPrompt:"第1項から第10項までの和は？",qs:[["19",["18","19","20","21"],"差がいつも +4 だから、15+4=19！"],["aₙ=4n-1",["aₙ=4n-1","aₙ=3n+4","aₙ=4n+1","aₙ=7n-4"],"初項3、公差4だから aₙ=3+(n-1)×4=4n-1。"],["210",["190","200","210","220"],"第10項は39。和は 10(3+39)/2=210！"]]},

function pickArithmeticStages(){return [0,1,2,3].map(i=>arithmeticSets[randomInt(arithmeticSets.length)][i])}
function geometricMath(text){
  if(!text.includes('an=')&&!text.includes('^')&&!text.includes('・'))return text;
  let x=text
    .replaceAll('an=','a_n=')
    .replaceAll('・','\\cdot ')
    .replaceAll('(1/2)','\\left(\\frac{1}{2}\\right)')
    .replaceAll('(1/3)','\\left(\\frac{1}{3}\\right)')
    .replaceAll('(1/10)','\\left(\\frac{1}{10}\\right)')
    .replaceAll('^(n-1)','^{n-1}')
    .replaceAll('^n','^{n}')
    .replaceAll('^4','^{4}');
  return `\\(${x}\\)`;
}
function geometricFeedback(text){
  return text
    .replace(/an=([^。]+)/g,(_,expr)=>geometricMath('an='+expr))
    .replaceAll('1/10','\\(\\frac{1}{10}\\)')
    .replaceAll('1/3','\\(\\frac{1}{3}\\)')
    .replaceAll('1/2','\\(\\frac{1}{2}\\)');
}
function normalizeGeometric(raw){return {title:raw[0],sequence:raw[1],general:geometricMath(raw[2]),sumPrompt:raw[3],qs:raw[4].map(q=>[geometricMath(q[0]),q[1].map(geometricMath),geometricFeedback(q[2])])}}
function pickGeometricStages(){return [0,1,2,3].map(i=>normalizeGeometric(geometricSets[randomInt(geometricSets.length)][i]))}

function pickDifferenceStages(){return [0,1,2].map(i=>differenceSets[randomInt(differenceSets.length)][i])}
let differenceState=null;
function startDifference(){mode="difference";differenceState={stages:pickDifferenceStages(),stageIndex:0,questionIndex:0,lives:3,gotItems:Array(3).fill(false),view:"question"};renderDifferenceRoom()}
function differenceShell(body){const s=differenceState,count=s.gotItems.filter(Boolean).length;return `<div class="room-layout"><section class="room-panel">${body}</section><aside class="room-panel"><h2 class="side-title">🥕 体力</h2><div class="life-box"><div class="life-label">まちがえると🥕が減ります</div><div class="lives">${"🥕".repeat(s.lives)||"なし"}</div></div><h2 class="side-title">🎒 アイテム図鑑</h2><div class="progress"><div class="progress-bar" style="width:${count/3*100}%"></div></div><p class="small">${count} / 3 個</p><div class="collection">${differenceItems.map((it,i)=>`<div class="item-slot ${s.gotItems[i]?"got":""}"><div class="item-icon">${it[0]}</div><div><div class="item-name">${it[1]}</div><div class="small">${s.gotItems[i]?"獲得済み":"まだ見つかっていません"}</div></div></div>`).join("")}</div><button class="reset" onclick="restartDifference()">この部屋を最初から</button><p class="small">※最初からやり直すと、各ステージの問題がランダムに選ばれます。</p></aside></div>`}
function renderDifferenceRoom(){updateHeader();const s=differenceState;if(s.view==="gameover"){screen.innerHTML=`<div class="center-screen"><div class="big">💦</div><h2>ゲームオーバー</h2><p>🥕がなくなってしまいました。<br>階差数列の部屋を最初から、新しい組み合わせで再挑戦できます。</p><button class="action" onclick="restartDifference()">別の問題で再挑戦する</button></div>`;return}if(s.gotItems.every(Boolean)){completed[3]=true;renderDifferenceComplete();return}if(s.view==="item"){const st=s.stages[s.stageIndex],it=differenceItems[s.stageIndex];screen.innerHTML=differenceShell(`<div class="center-screen"><div class="pink-badge">${st.title} クリア！</div><div class="big">${it[0]}</div><h2>${it[1]} を手に入れた！</h2><p>4問クリアしたので、アイテムを獲得しました。</p><button class="action" onclick="nextDifferenceStage()">次のステージへ</button></div>`);return}const st=s.stages[s.stageIndex],q=st.qs[s.questionIndex],labels=["① 次の項を求めよう","② 階差数列の一般項","③ 一般項を求める式","④ 一般項"];const body=`<div class="stage-head"><span class="pink-badge">ステージ${s.stageIndex+1}：${st.title}</span><span class="pink-badge">${labels[s.questionIndex]}</span></div><div class="question-card"><div class="small" style="text-align:center">各ステージは3種類からランダムに選ばれています</div><div class="sequence">${st.seq.map(n=>`<div class="term">${n}</div>`).join("")}${s.questionIndex===0?'<div class="term blank">？</div>':""}</div><div class="prompt">${q[0]}</div>${s.questionIndex>=2?`<div class="formula-hint">階差数列：${st.hint}</div>`:""}<div class="choices">${shuffle(q[2]).map(c=>`<button class="choice sigma-choice" data-choice="${c}">${c}</button>`).join("")}</div><div class="feedback" id="feedback">答えを選んでね。</div><button class="action" id="nextBtn" disabled>次へ進む</button></div>`;screen.innerHTML=differenceShell(body);document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>chooseDifference(b.dataset.choice));document.getElementById("nextBtn").onclick=goDifferenceNext;typeset()}
function chooseDifference(choice){const s=differenceState,q=s.stages[s.stageIndex].qs[s.questionIndex],fb=document.getElementById("feedback"),nx=document.getElementById("nextBtn");document.querySelectorAll(".choice").forEach(b=>{b.classList.remove("wrong");if(b.dataset.choice===choice&&choice!==q[1])b.classList.add("wrong")});if(choice===q[1]){document.querySelectorAll(".choice").forEach(b=>{if(b.dataset.choice===q[1])b.classList.add("correct");b.disabled=true});fb.innerHTML=`正解！🎉<br>${q[3]}`;nx.disabled=false;typeset()}else{if(!debugInfinite)s.lives--;if(s.lives<=0){s.view="gameover";setTimeout(renderDifferenceRoom,350);return}const hints=["階差を自分で作って、次の階差を予想しよう。","階差数列そのものが、等差数列か等比数列かを見てみよう。","a₁に、第1階差から第(n−1)階差までを足す形を選ぼう。","Σの公式を使って、一般項を整理しよう。"];fb.innerHTML=`惜しい！🥕が1つ減りました。もう一度考えてみよう。<br>ヒント：${hints[s.questionIndex]}`;const life=document.querySelector(".lives");if(life)life.textContent="🥕".repeat(s.lives)||"なし";typeset()}}
function goDifferenceNext(){const s=differenceState;if(s.questionIndex<3){s.questionIndex++;renderDifferenceRoom()}else{s.gotItems[s.stageIndex]=true;s.view="item";updateHeader();renderDifferenceRoom()}}
function nextDifferenceStage(){const s=differenceState;s.stageIndex=s.gotItems.findIndex(v=>!v);s.questionIndex=0;s.view="question";renderDifferenceRoom()}
function restartDifference(){startDifference()}
function renderDifferenceComplete(){mode="difference";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">🧭</div><h2>階差数列の部屋 クリア！</h2><p>3つのアイテムがそろいました。<br>宝箱の暗証番号を1桁手に入れた！</p><div class="reveal">${code[3]}</div><p>忘れたら、この扉をもう一度開けば確認できます🐰</p><button class="action" onclick="renderLobby()">エントランスへ戻る</button></div>`}
function renderDifferenceCleared(){mode="difference";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">🧭</div><h2>階差数列の部屋はクリア済み！</h2><p>この部屋で手に入れた暗証番号は……</p><div class="reveal">${code[3]}</div><button class="action" onclick="renderLobby()">エントランスへ戻る</button><button class="reset" onclick="startDifference()">階差数列でもう一度遊ぶ</button></div>`}

let roomState=null;
function makeRoomState(type){return {type,stages:type==="arithmetic"?pickArithmeticStages():pickGeometricStages(),stageIndex:0,questionIndex:0,lives:3,gotItems:Array(4).fill(false),view:"question"}}
function startArithmetic(){mode="arithmetic";roomState=makeRoomState("arithmetic");renderLearningRoom()}
function startGeometric(){mode="geometric";roomState=makeRoomState("geometric");renderLearningRoom()}
function roomMeta(){const arithmetic=roomState.type==="arithmetic";return {index:arithmetic?0:1,name:arithmetic?"等差数列":"等比数列",icon:arithmetic?"🌸":"💎",items:arithmetic?arithmeticItems:geometricItems.map(x=>({item:x[0],name:x[1]})),hints:arithmetic?["隣どうしの差を見てみよう。","n=1,2,3,… を入れたときに数列と合う式を探そう。","一般項から最後の項を求め、初項と最後の項を使おう。"]: ["前の項に何をかけているかを見てみよう。","初項と公比を見つけて、aₙ=a₁rⁿ⁻¹ の形にしよう。","必要な項を求め、等比数列の和の公式も使ってみよう。"],labels:["① 次の項を求めよう","② 一般項を求めよう","③ 和を求めよう"]}}
function renderLearningRoom(){updateHeader();const m=roomMeta(),s=roomState;if(s.view==="gameover"){screen.innerHTML=`<div class="center-screen"><div class="big">💦</div><h2>ゲームオーバー</h2><p>🥕がなくなってしまいました。<br>${m.name}の部屋を最初から、新しい組み合わせで再挑戦できます。</p><button class="action" onclick="retryRoom()">別の数列で再挑戦する</button></div>`;return}if(s.gotItems.every(Boolean)){completed[m.index]=true;renderRoomComplete(m.index);return}if(s.view==="item"){const st=s.stages[s.stageIndex],it=m.items[s.stageIndex];screen.innerHTML=roomShell(`<div class="center-screen"><div class="pink-badge">${st.title} クリア！</div><div class="big">${it.item}</div><h2>${it.name} を手に入れた！</h2><p>3問クリアしたので、アイテムを獲得しました。</p><button class="action" onclick="nextRoomStage()">次の${m.name}へ</button></div>`);return}const st=s.stages[s.stageIndex],q=st.qs[s.questionIndex],prompts=["次の項はどれ？","一般項 aₙ はどれ？",st.sumPrompt];const body=`<div class="stage-head"><span class="pink-badge">ステージ${s.stageIndex+1}：${st.title}</span><span class="pink-badge">${m.labels[s.questionIndex]}</span></div><div class="question-card"><div class="small" style="text-align:center">各ステージの問題は3種類からランダムに選ばれています</div><div class="sequence">${st.sequence.map(n=>`<div class="term">${n}</div>`).join("")}<div class="term blank">？</div></div><div class="prompt">${prompts[s.questionIndex]}</div>${s.questionIndex===2?`<div class="formula-hint">一般項：${s.type==="geometric"?geometricLatex(st.general):st.general}</div>`:""}<div class="choices">${shuffle(q[1]).map(c=>`<button class="choice" data-choice="${c}">${s.type==="geometric"?geometricLatex(c):c}</button>`).join("")}</div><div class="feedback" id="feedback">答えを選んでね。</div><button class="action" id="nextBtn" disabled>次へ進む</button></div>`;screen.innerHTML=roomShell(body);document.querySelectorAll(".choice").forEach(btn=>btn.onclick=()=>chooseRoom(btn.dataset.choice));document.getElementById("nextBtn").onclick=goRoomNext;typeset()}
function roomShell(body){const m=roomMeta(),s=roomState,count=s.gotItems.filter(Boolean).length;return `<div class="room-layout"><section class="room-panel">${body}</section><aside class="room-panel"><h2 class="side-title">🥕 体力</h2><div class="life-box"><div class="life-label">まちがえると🥕が減ります</div><div class="lives">${"🥕".repeat(s.lives)||"なし"}</div></div><h2 class="side-title">🎒 アイテム図鑑</h2><div class="progress"><div class="progress-bar" style="width:${count/4*100}%"></div></div><p class="small">${count} / 4 個</p><div class="collection">${m.items.slice(0,4).map((it,i)=>`<div class="item-slot ${s.gotItems[i]?"got":""}"><div class="item-icon">${it.item}</div><div><div class="item-name">${it.name}</div><div class="small">${s.gotItems[i]?"獲得済み":"まだ見つかっていません"}</div></div></div>`).join("")}</div><button class="reset" onclick="restartCurrentRoom()">この部屋を最初から</button><p class="small">※最初からやり直すと、各ステージの問題がもう一度ランダムに選ばれます。</p></aside></div>`}
function chooseRoom(choice){const m=roomMeta(),s=roomState,q=s.stages[s.stageIndex].qs[s.questionIndex],feedback=document.getElementById("feedback"),nextBtn=document.getElementById("nextBtn");document.querySelectorAll(".choice").forEach(btn=>{btn.classList.remove("wrong");if(btn.dataset.choice===choice&&choice!==q[0])btn.classList.add("wrong")});if(choice===q[0]){document.querySelectorAll(".choice").forEach(btn=>{if(btn.dataset.choice===q[0])btn.classList.add("correct");btn.disabled=true});feedback.innerHTML=`正解！🎉<br>${roomState.type==="geometric"?geometricFeedback(q[2]):q[2]}`;nextBtn.disabled=false;typeset()}else{if(!debugInfinite)s.lives--;if(s.lives<=0){s.view="gameover";setTimeout(renderLearningRoom,350);return}feedback.innerHTML=`惜しい！🥕が1つ減りました。もう一度考えてみよう。<br>ヒント：${m.hints[s.questionIndex]}`;const life=document.querySelector(".lives");if(life)life.textContent="🥕".repeat(s.lives)||"なし"}}
function goRoomNext(){const s=roomState;if(s.questionIndex<2){s.questionIndex++;renderLearningRoom()}else{s.gotItems[s.stageIndex]=true;s.view="item";updateHeader();renderLearningRoom()}}
function nextRoomStage(){const s=roomState;s.stageIndex=s.gotItems.findIndex(v=>!v);s.questionIndex=0;s.view="question";renderLearningRoom()}
function retryRoom(){roomState=makeRoomState(roomState.type);renderLearningRoom()}
function restartCurrentRoom(){roomState=makeRoomState(roomState.type);renderLearningRoom()}
function renderRoomComplete(i){mode=i===0?"arithmetic":"geometric";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">🏆</div><h2>${roomInfo[i].name}の部屋 クリア！</h2><p>4つのアイテムがそろいました。<br>宝箱の暗証番号を1桁手に入れた！</p><div class="reveal">${code[i]}</div><p>忘れたら、この扉をもう一度開けば確認できます🐰</p><button class="action" onclick="renderLobby()">エントランスへ戻る</button></div>`}
function renderRoomCleared(i){mode=i===0?"arithmetic":"geometric";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">${roomInfo[i].icon}</div><h2>${roomInfo[i].name}の部屋はクリア済み！</h2><p>この部屋で手に入れた暗証番号は……</p><div class="reveal">${code[i]}</div><button class="action" onclick="renderLobby()">エントランスへ戻る</button><button class="reset" onclick="${i===0?'startArithmetic()':'startGeometric()'}">${roomInfo[i].name}でもう一度遊ぶ</button></div>`}
function openTreasure(){mode="treasure";updateHeader();screen.innerHTML=`<div class="center-screen"><div class="big">🧰</div><h2>宝箱の暗証番号を入力しよう</h2><div class="code-digits">${[0,1,2,3].map(()=>'<div class="code-digit">?</div>').join("")}</div><input class="code-input" id="codeInput" type="tel" inputmode="numeric" maxlength="4" placeholder="0000"><div class="error" id="codeError"></div><button class="action" onclick="checkCode()">宝箱を開ける</button></div>`}
function checkCode(){const input=document.getElementById("codeInput").value.trim();if(input===code){completed=[true,true,true,true];updateHeader();const allIcons=globalItemData().flatMap(g=>g.items.map(it=>it[0]));screen.innerHTML=`<div class="hero-finale"><div class="hero-crown">✨ 👑 ✨</div><div class="hero-party">🧙‍♂️⚔️🐰</div><h2 class="hero-title">QUEST COMPLETE!</h2><div class="hero-rank">🏆 称号「数列マスター」獲得</div><div class="hero-message"><strong>クリアおめでとう！</strong><br>4つの扉を攻略し、すべての秘宝を集めた君は<br><b>立派な数列マスターだ。</b><br><br>しかし、数学の世界にはまだ見ぬ法則が眠っている。<br>次なる目的地は――<b>漸化式クエスト</b>。<br>新しい仲間と武器を手に、次の冒険へ進もう！</div><div class="hero-items">${allIcons.map(x=>`<span>${x}</span>`).join("")}</div><div class="hero-next">📖 NEXT QUEST：漸化式の迷宮</div><div class="hero-trail">まだ旅は続く……</div><div class="hero-actions"><button class="action" onclick="renderLobby()">🏰 エントランスへ戻る</button><button class="reset" onclick="resetWholeQuest()">🔄 はじめから冒険する</button></div></div>`}else document.getElementById("codeError").textContent="暗証番号が違うみたい…もう一度確認しよう！"}
function resetWholeQuest(){completed=[false,false,false,false];roomState=null;sigmaState=null;differenceState=null;renderLobby()}

let debugInfinite=false;
function toggleDebug(force){const m=document.getElementById("debugModal");const open=typeof force==="boolean"?force:!m.classList.contains("open");m.classList.toggle("open",open);document.getElementById("debugCode").textContent=code;document.getElementById("infiniteLives").checked=debugInfinite}
function debugGo(i){toggleDebug(false);if(i===0)startArithmetic();else if(i===1)startGeometric();else if(i===2)startSigma();else startDifference()}
function debugUnlockAll(){completed=[true,true,true,false];renderLobby();toggleDebug(false)}
function debugCompleteAll(){completed=[true,true,true,true];renderLobby();toggleDebug(false)}
function debugReset(){completed=[false,false,false,false];debugInfinite=false;renderLobby();toggleDebug(false)}


renderLobby();

</script>
